services:
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${PORT:-6175}:${PORT:-6175}"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string-at-least-32-chars}
      - AUTH_PEPPER=${AUTH_PEPPER:-}
      - SMTP_URL=${SMTP_URL:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@localhost}
      - PORT=${PORT:-6175}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6175/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
